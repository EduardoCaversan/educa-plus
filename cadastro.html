<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="shortcut icon" type="imagex/png" href="./assets/student.ico">
</head>

<body>
    <header class="header">
        <div class="header-left">
            <h1>Educa+</h1>
        </div>
        <div class="header-right">
            <button id="theme-toggle" class="theme-btn">
                <span class="material-icons" id="theme-icon">dark_mode</span>
            </button>
            <span class="material-icons menu-toggle" id="menu-toggle">menu</span>
        </div>
        <div id="sidebar" class="sidebar">
        </div>
    </header>

    <main class="container">
        <form action="./login.html" id="cadastro-form">
            <label>Nome</label><input required>
            <label>Email</label><input type="email" required>
            <label>Senha</label><input type="password" required>
            <label>Idade</label><input type="number">
            <label>Área</label><input>
            <button>Enviar</button>
        </form>
    </main>

    <script src="./js/theme.js"></script>
    <script src="./js/cadastro.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/auth.js"></script>
</body>
<footer class="footer">
    <p>&copy; 2026 Educa+</p>

    <a href="./assets/curriculo.pdf" class="cv-btn" target="_blank">
        <span class="material-icons">description</span>
        Ver Currículo
    </a>
</footer>

</html>
